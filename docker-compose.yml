services:
  db:
    image: mongo:7
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${DB_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${DB_PASSWORD}
      MONGO_INITDB_DATABASE: ${DB_NAME}
    volumes:
      - db_data:/data/db
    networks: [appnet]
    restart: unless-stopped
    healthcheck:
      test: ["CMD","mongosh","--eval","db.adminCommand('ping')","--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  backend:
    image: techcrushgrp14/backend:latest
    env_file: .env
    environment:
      MONGO_URI: mongodb://${DB_USER}:${DB_PASSWORD}@db:27017/${DB_NAME}?authSource=admin
      PORT: 3001
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
    networks: [appnet]
    restart: unless-stopped
 
  frontend:
    image: techcrushgrp14/frontend:latest
    expose:
      - "3000"
    depends_on:
      - backend
    networks: [appnet]
    restart: unless-stopped
 
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks: [appnet]
    restart: unless-stopped
 
networks:
  appnet:
    driver: bridge
 
volumes:
  db_data: